version: '3.8'

services:
  php:
    container_name: php-support_php
    build:
      context: ./docker/php/
      args:
        - PHP_VERSION=${PHP_VERSION}
        - COMPOSER_VERSION=${COMPOSER_VERSION}
      target: php-base
    volumes:
      - .:/var/www/php-support:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini:ro,delegated
    working_dir: /var/www/php-support
    env_file: .env
    environment:
      TZ: Asia/Tokyo
      XDEBUG_MODE: '${XDEBUG_MODE:-off}'
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        php -d memory_limit=-1 /usr/local/bin/composer install --optimize-autoloader
        vendor/bin/phpunit
#        vendor/bin/psalm --show-info=true
    networks:
      - php-support

networks:
  php-support:
    name: php-support